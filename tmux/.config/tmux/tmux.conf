set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",ghostty:RGB"
set -g focus-events on
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u
set -s escape-time 10
set -g renumber-windows on
set -g detach-on-destroy off
set -g base-index 1
set -g pane-base-index 1
set -g set-clipboard on
set -g allow-rename off
set -g status-position top
set -g status-justify left
set -g status-left-length 24
set -g status-right-length 80
set -g status-interval 5
set -g status-left " #[bold]#S "
set -g status-right "#[nobold]#{?client_prefix,#[bold]PREFIX ,}#{pane_current_path} "
set -g window-status-separator ""
set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W "
set -g message-style "fg=colour0,bg=colour11"
set -g message-command-style "fg=colour0,bg=colour11"
set -g display-time 2000
set -g pane-border-lines single
set -g pane-border-status off
set -g popup-border-lines single
set -g popup-border-style "default"
set -g mode-keys vi
set -g history-limit 20000
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

set -g prefix C-b
bind C-b send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"
bind c new-window -c "#{pane_current_path}"
bind C new-window
bind R command-prompt -I "#W" "rename-window -- '%%'"
bind s choose-tree -Zw
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind , previous-window
bind . next-window
bind n new-window -c "#{pane_current_path}"
bind x kill-pane
bind X kill-window
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

if-shell 'defaults read -g AppleInterfaceStyle >/dev/null 2>&1' \
  'source-file ~/.config/tmux/themes/dark.conf' \
  'source-file ~/.config/tmux/themes/light.conf'

set-hook -g client-light-theme 'source-file ~/.config/tmux/themes/light.conf'
set-hook -g client-dark-theme 'source-file ~/.config/tmux/themes/dark.conf'
set-hook -g client-attached 'if -F "#{==:#{client_theme},light}" "source-file ~/.config/tmux/themes/light.conf" "source-file ~/.config/tmux/themes/dark.conf"'
